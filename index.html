<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Изучаем Хангыль вместе! 🌸</title>
    <style>
        :root {
            --bg-pastel: #fff5f7;
            --anime-pink: #ffb7c5;
            --anime-purple: #e8dbfc;
            --anime-blue: #cbe3db;
            --anime-mint: #d4f0f0;
            --text-dark: #4a4a4a;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: linear-gradient(135deg, var(--bg-pastel) 0%, #f3e7ff 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 4px solid var(--anime-pink);
            padding: 30px;
            box-shadow: 0 15px 30px rgba(255, 183, 197, 0.3);
            text-align: center;
            margin-top: 10px;
        }

        h1 {
            font-size: 2rem;
            color: #d65a7f;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0px #fff;
        }

        .level-indicator {
            background: var(--anime-purple);
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 20px;
            color: #6c5ce7;
            border: 2px solid #ffffff;
        }

        .level-description {
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-weight: 500;
            color: #57606f;
        }

        /* Зона букв для перетаскивания */
        .letters-bank {
            display: flex;
            justify-content: center;
            gap: 15px;
            min-height: 90px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            border: 2px dashed var(--anime-pink);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .letter {
            width: 65px;
            height: 65px;
            background: var(--card-bg);
            border: 3px solid var(--anime-pink);
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: grab;
            box-shadow: 0 6px 0px var(--anime-pink);
            transition: transform 0.1s, box-shadow 0.1s;
            touch-action: none;
        }

        .letter:active {
            cursor: grabbing;
            transform: translateY(4px);
            box-shadow: 0 2px 0px var(--anime-pink);
        }

        /* Главная рабочая зона игры */
        .workspace {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px;
            margin-bottom: 30px;
        }

        /* Окна для уровней 1 и 2 */
        .target-box {
            width: 140px;
            height: 140px;
            background: #fff;
            border: 4px dashed #9bc5ff;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
            position: relative;
        }

        .target-box.hovered {
            background: #eef5ff;
            border-color: #54a0ff;
        }

        /* Облачка с подсказками и заданиями */
        .cloud-result {
            margin-top: 20px;
            background: #ffffff;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #d65a7f;
            border: 3px solid var(--anime-purple);
            box-shadow: 0 8px 0 var(--anime-purple);
            display: inline-block;
            animation: float 2s ease-in-out infinite;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cloud-result.show {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Уровень 3 и 5: Облака с кружочками */
        .clouds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            width: 100%;
            padding: 10px;
        }

        .cloud-task {
            background: #ffffff;
            border: 3px solid #b7e4ff;
            border-radius: 30px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 0 #b7e4ff;
        }

        .cloud-task .sound-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2e86de;
        }

        .slots-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 5px;
        }

        /* Направления осей для кружочков */
        .dir-row { flex-direction: row; }
        .dir-column { flex-direction: column; }

        .circle-slot {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 3px dashed #b7e4ff;
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .circle-slot.hovered {
            background: #eef5ff;
            border-color: #54a0ff;
        }
        
        .circle-slot .letter {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: none;
            font-size: 1.4rem;
        }

        /* УРОВЕНЬ 4: Адаптивный конструктор слогов */
        .constructor-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            transition: all 0.4s ease;
        }

        .syllable-box {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: rgba(255,255,255,0.6);
            border-radius: 25px;
            border: 3px solid var(--anime-purple);
        }

        .slot-consonant { border-color: #ff9ff3; background: #fff5fd; }
        .slot-vowel { border-color: #feca57; background: #fffdf0; }

        .arrow-indicator {
            font-size: 2.5rem;
            color: #cf6a87;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
        }

        /* Кнопка навигации */
        .btn-next {
            background: linear-gradient(to bottom, #ff9ff3, #f368e0);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #c842b2, 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.1s;
            margin-top: 20px;
            display: none;
        }

        .btn-next:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #c842b2, 0 4px 10px rgba(0,0,0,0.1);
        }

        .dragging {
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1 id="gameTitle">🌸 Корейский экспресс 🌸</h1>
        <div class="level-indicator" id="levelIndicator">Уровень 1/5</div>
        <div class="level-description" id="levelDesc">Перетащи гласную букву в окошко, чтобы узнать её звучание!</div>

        <!-- Банк доступных букв -->
        <div class="letters-bank" id="lettersBank"></div>

        <!-- Рабочее пространство уровня -->
        <div class="workspace" id="workspace"></div>

        <!-- Кнопка перехода к следующему шагу -->
        <button class="btn-next" id="btnNext">Дальше ✨</button>
    </div>

    <script>
        // Данные игры
        const vowels = [
            { char: 'ㅏ', sound: 'а', type: 'vertical' },
            { char: 'ㅓ', sound: 'о (откр.)', type: 'vertical' },
            { char: 'ㅜ', sound: 'у', type: 'horizontal' },
            { char: 'ㅗ', sound: 'о (закр.)', type: 'horizontal' }
        ];

        const consonants = [
            { char: 'ㅁ', sound: 'м' },
            { char: 'ㄴ', sound: 'н' },
            { char: 'ㄹ', sound: 'р' }
        ];

        // Карта слогов для 4 и 5 уровней
        const syllablesMap = {
            'ㅁㅏ': 'ма', 'ㅁㅓ': 'мо (откр.)', 'ㅁㅜ': 'му', 'ㅁㅗ': 'мо (закр.)',
            'ㄴㅏ': 'на', 'ㄴㅓ': 'но (откр.)', 'ㄴㅜ': 'ну', 'ㄴㅗ': 'но (закр.)',
            'ㄹㅏ': 'ра', 'ㄹㅓ': 'ро (откр.)', 'ㄹㅜ': 'ру', 'ㄹㅗ': 'ро (закр.)'
        };

        let currentLevel = 1;
        let draggedElement = null;

        const bankElement = document.getElementById('lettersBank');
        const workspace = document.getElementById('workspace');
        const btnNext = document.getElementById('btnNext');
        const levelIndicator = document.getElementById('levelIndicator');
        const levelDesc = document.getElementById('levelDesc');

        function initLevel(level) {
            currentLevel = level;
            bankElement.innerHTML = '';
            workspace.innerHTML = '';
            btnNext.style.display = 'none';
            levelIndicator.textContent = `Уровень ${level}/5`;

            if (level === 1) {
                levelDesc.textContent = "Перетащи гласную букву в окошко, чтобы узнать её звучание!";
                renderBank(vowels);
                createSingleTargetBox();
            } else if (level === 2) {
                levelDesc.textContent = "А теперь перетащи согласную букву в окошко и запомни звук!";
                renderBank(consonants);
                createSingleTargetBox();
            } else if (level === 3) {
                levelDesc.textContent = "Повторение! Разложи все гласные и согласные по облачкам со звуками!";
                const allElements = [...consonants, ...vowels];
                renderBank(shuffleArray(allElements));
                createMatchingClouds(allElements);
            } else if (level === 4) {
                levelDesc.textContent = "Конструктор слогов! Поставь согласную и гласную. Окна сами подстроятся!";
                const allElements = [...consonants, ...vowels];
                renderBank(shuffleArray(allElements));
                createSyllableConstructor();
            } else if (level === 5) {
                levelDesc.textContent = "Финал! Собери слоги. Кружочки встанут в ряд или друг под друга в зависимости от «О» или «У»!";
                const allElements = [...consonants, ...vowels];
                // Даем игроку достаточно букв для сборки всех 4 слогов
                renderBank(shuffleArray([...allElements, ...allElements])); 
                createFinalSyllableClouds();
            }
            setupDragAndDrop();
        }

        function renderBank(items) {
            items.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'letter';
                el.textContent = item.char;
                el.draggable = true;
                el.dataset.char = item.char;
                el.dataset.sound = item.sound;
                el.dataset.type = item.type || '';
                el.id = `letter-${currentLevel}-${index}`;
                bankElement.appendChild(el);
            });
        }

        function createSingleTargetBox() {
            const box = document.createElement('div');
            box.className = 'target-box';
            box.id = 'singleTarget';
            
            const cloud = document.createElement('div');
            cloud.className = 'cloud-result';
            cloud.id = 'singleCloud';

            workspace.appendChild(box);
            workspace.appendChild(cloud);
        }

        function createMatchingClouds(items) {
            const grid = document.createElement('div');
            grid.className = 'clouds-grid';
            
            items.forEach(item => {
                const cloud = document.createElement('div');
                cloud.className = 'cloud-task';
                
                const label = document.createElement('span');
                label.className = 'sound-text';
                label.textContent = `Звук: [${item.sound.toUpperCase()}]`;
                
                const slot = document.createElement('div');
                slot.className = 'circle-slot';
                slot.dataset.expected = item.char;

                cloud.appendChild(label);
                cloud.appendChild(slot);
                grid.appendChild(cloud);
            });
            workspace.appendChild(grid);
        }

        function createSyllableConstructor() {
            const wrapper = document.createElement('div');
            wrapper.className = 'constructor-layout';
            wrapper.id = 'constructorLayout';

            const container = document.createElement('div');
            container.className = 'syllable-box dir-row';
            container.id = 'syllableBox';

            const slotC = document.createElement('div');
            slotC.className = 'target-box slot-consonant';
            slotC.id = 'slotC';
            slotC.dataset.expectType = 'consonant';

            const slotV = document.createElement('div');
            slotV.className = 'target-box slot-vowel';
            slotV.id = 'slotV';
            slotV.dataset.expectType = 'vowel';

            const arrow = document.createElement('div');
            arrow.className = 'arrow-indicator';
            arrow.id = 'arrowInd';
            arrow.textContent = '→';

            container.appendChild(slotC);
            container.appendChild(slotV);

            const resCloud = document.createElement('div');
            resCloud.className = 'cloud-result';
            resCloud.id = 'constructorCloud';

            wrapper.appendChild(container);
            wrapper.appendChild(arrow);
            
            workspace.appendChild(wrapper);
            workspace.appendChild(resCloud);
        }

        function createFinalSyllableClouds() {
            const grid = document.createElement('div');
            grid.className = 'clouds-grid';

            // Список слогов: здесь две разные «О» дают разную ориентацию кружочков!
            const tasks = [
                { rus: 'ма', c: 'ㅁ', v: 'ㅏ', type: 'vertical' },      // Слева направо
                { rus: 'но (откр.)', c: 'ㄴ', v: 'ㅓ', type: 'vertical' }, // Слева направо (ㅓ)
                { rus: 'ру', c: 'ㄹ', v: 'ㅜ', type: 'horizontal' },    // Сверху вниз
                { rus: 'но (закр.)', c: 'ㄴ', v: 'ㅗ', type: 'horizontal' } // Сверху вниз (ㅗ)
            ];

            tasks.forEach(task => {
                const cloud = document.createElement('div');
                cloud.className = 'cloud-task';

                const label = document.createElement('span');
                label.className = 'sound-text';
                label.textContent = `Слог: "${task.rus.toUpperCase()}"`;

                const slotsDiv = document.createElement('div');
                slotsDiv.className = `slots-container ${task.type === 'vertical' ? 'dir-row' : 'dir-column'}`;

                const sC = document.createElement('div');
                sC.className = 'circle-slot slot-consonant';
                sC.dataset.expected = task.c;

                const sV = document.createElement('div');
                sV.className = 'circle-slot slot-vowel';
                sV.dataset.expected = task.v;

                slotsDiv.appendChild(sC);
                slotsDiv.appendChild(sV);
                cloud.appendChild(label);
                cloud.appendChild(slotsDiv);
                grid.appendChild(cloud);
            });

            workspace.appendChild(grid);
        }

        function setupDragAndDrop() {
            const letters = document.querySelectorAll('.letter');
            
            letters.forEach(letter => {
                letter.addEventListener('dragstart', handleDragStart);
                letter.addEventListener('dragend', handleDragEnd);
                
                letter.addEventListener('touchstart', handleTouchStart, {passive: false});
                letter.addEventListener('touchmove', handleTouchMove, {passive: false});
                letter.addEventListener('touchend', handleTouchEnd);
            });

            if (currentLevel === 1 || currentLevel === 2) {
                setupTarget(document.getElementById('singleTarget'), checkLevel1and2);
            } else if (currentLevel === 3) {
                document.querySelectorAll('.circle-slot').forEach(slot => {
                    setupTarget(slot, checkLevel3);
                });
            } else if (currentLevel === 4) {
                setupTarget(document.getElementById('slotC'), checkLevel4);
                setupTarget(document.getElementById('slotV'), checkLevel4);
            } else if (currentLevel === 5) {
                document.querySelectorAll('.circle-slot').forEach(slot => {
                    setupTarget(slot, checkLevel5);
                });
            }
        }

        function setupTarget(target, dropHandler) {
            if(!target) return;
            target.addEventListener('dragover', (e) => e.preventDefault());
            target.addEventListener('dragenter', () => target.classList.add('hovered'));
            target.addEventListener('dragleave', () => target.classList.remove('hovered'));
            target.addEventListener('drop', (e) => {
                target.classList.remove('hovered');
                const id = e.dataTransfer.getData('text/plain');
                const dragged = document.getElementById(id) || draggedElement;
                if(dragged) dropHandler(target, dragged);
            });
        }

        function handleDragStart(e) {
            e.dataTransfer.setData('text/plain', this.id);
            this.classList.add('dragging');
            draggedElement = this;
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
        }

        function handleTouchStart(e) {
            draggedElement = this;
            this.classList.add('dragging');
        }

        function handleTouchMove(e) {
            e.preventDefault(); 
            const touch = e.touches[0];
            this.style.position = 'absolute';
            this.style.left = (touch.clientX - 32) + 'px';
            this.style.top = (touch.clientY - 32) + 'px';
            this.style.zIndex = 1000;
        }

        function handleTouchEnd(e) {
            this.classList.remove('dragging');
            this.style.position = 'static';
            this.style.zIndex = 'auto';

            const touch = e.changedTouches[0];
            const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
            
            if (targetEl) {
                const targetBox = targetEl.closest('.target-box') || targetEl.closest('.circle-slot');
                if (targetBox) {
                    if (currentLevel === 1 || currentLevel === 2) checkLevel1and2(targetBox, this);
                    if (currentLevel === 3) checkLevel3(targetBox, this);
                    if (currentLevel === 4) checkLevel4(targetBox, this);
                    if (currentLevel === 5) checkLevel5(targetBox, this);
                }
            }
            draggedElement = null;
        }

        function checkLevel1and2(target, dragged) {
            target.innerHTML = '';
            const clone = dragged.cloneNode(true);
            clone.style.position = 'static';
            target.appendChild(clone);

            const cloud = document.getElementById('singleCloud');
            cloud.textContent = `Звучит как: [ ${dragged.dataset.sound.toUpperCase()} ]`;
            cloud.classList.add('show');

            btnNext.style.display = 'inline-block';
        }

        function checkLevel3(target, dragged) {
            if (target.dataset.expected === dragged.dataset.char) {
                target.innerHTML = '';
                const clone = dragged.cloneNode(true);
                clone.style.position = 'static';
                target.appendChild(clone);
                dragged.remove();
                checkWinConditionLevel3();
            }
        }

        function checkWinConditionLevel3() {
            const slots = document.querySelectorAll('.circle-slot');
            let allFilled = true;
            slots.forEach(s => { if(s.children.length === 0) allFilled = false; });
            if (allFilled) btnNext.style.display = 'inline-block';
        }

        function checkLevel4(target, dragged) {
            const isVowel = dragged.dataset.type !== ''; 
            
            if (target.id === 'slotC' && isVowel) return;
            if (target.id === 'slotV' && !isVowel) return;

            target.innerHTML = '';
            const clone = dragged.cloneNode(true);
            clone.style.position = 'static';
            target.appendChild(clone);

            if (target.id === 'slotV') {
                const box = document.getElementById('syllableBox');
                const arrow = document.getElementById('arrowInd');
                
                if (dragged.dataset.type === 'vertical') {
                    box.className = 'syllable-box dir-row';
                    arrow.textContent = '→';
                } else if (dragged.dataset.type === 'horizontal') {
                    box.className = 'syllable-box dir-column';
                    arrow.textContent = '↓';
                }
            }

            const slotC = document.getElementById('slotC');
            const slotV = document.getElementById('slotV');

            if (slotC.children.length > 0 && slotV.children.length > 0) {
                const charC = slotC.children[0].dataset.char;
                const charV = slotV.children[0].dataset.char;
                const key = charC + charV;

                const cloud = document.getElementById('constructorCloud');
                if (syllablesMap[key]) {
                    cloud.textContent = `Получился слог: "${syllablesMap[key].toUpperCase()}" ✨`;
                    cloud.classList.add('show');
                    btnNext.style.display = 'inline-block';
                }
            }
        }

        function checkLevel5(target, dragged) {
            if (target.dataset.expected === dragged.dataset.char) {
                target.innerHTML = '';
                const clone = dragged.cloneNode(true);
                clone.style.position = 'static';
                target.appendChild(clone);
                dragged.remove();
                checkWinConditionLevel5();
            }
        }

        function checkWinConditionLevel5() {
            const slots = document.querySelectorAll('.circle-slot');
            let allFilled = true;
            slots.forEach(s => { if(s.children.length === 0) allFilled = false; });
            
            if (allFilled) {
                levelDesc.textContent = "🎉 Потрясающе! Ты идеально поняла разницу между вертикальным и горизонтальным написанием слогов!";
                btnNext.style.display = 'inline-block';
                btnNext.textContent = 'Пройти заново 🌟';
            }
        }

        btnNext.addEventListener('click', () => {
            if (currentLevel < 5) {
                initLevel(currentLevel + 1);
            } else {
                initLevel(1);
                btnNext.textContent = 'Дальше ✨';
            }
        });

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        initLevel(1);
    </script>
</body>
</html>
