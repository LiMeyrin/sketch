<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Творческий Блокнот</title>
    <style>
        :root {
            --bg-color: #f5f6fa;
            --sidebar-width: 280px;
            --border-color: #dcdde1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: #2f3640;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: #ffffff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 1.25rem;
            margin-bottom: 20px;
            color: #718093;
        }

        .btn-add {
            background-color: #2f3640;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .notebook-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .notebook-item {
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            background-color: #f5f6fa;
            font-weight: 500;
        }

        .notebook-item.active {
            background-color: #fbc531;
            color: #2f3640;
            font-weight: 600;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .toolbar {
            height: 75px;
            background-color: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 20px;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-group label {
            font-size: 0.9rem;
            color: #718093;
            font-weight: 600;
        }

        .color-picker {
            -webkit-appearance: none;
            appearance: none;
            width: 38px;
            height: 38px;
            background-color: transparent;
            border: none;
            cursor: pointer;
        }

        .color-picker::-webkit-color-swatch {
            border-radius: 50%;
            border: 2px solid #dcdde1;
        }

        .brush-size {
            cursor: pointer;
            width: 100px;
        }

        .select-brush {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: #f5f6fa;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-tool {
            background: #f5f6fa;
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-tool.active {
            background: #2f3640;
            color: white;
        }

        .btn-clear {
            margin-left: auto;
            background-color: #f5f6fa;
            color: #e84118;
            border: 1px solid #dcdde1;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .workspace {
            flex-grow: 1;
            display: flex;
            padding: 25px;
            gap: 25px;
            overflow: hidden;
        }

        .canvas-container {
            flex-grow: 1;
            background: white;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #e1b12c;
        }

        canvas {
            background-color: #fdfbf7;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 24px 24px;
            display: block;
            cursor: none; /* Полностью убираем курсор */
        }

        .notes-container {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .notes-container textarea {
            flex-grow: 1;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            resize: none;
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            background: #fdfbf7;
            background-image: linear-gradient(#dcdde1 1px, transparent 1px);
            background-size: 100% 1.6rem;
            color: #2f3640;
        }

        .no-notebook-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: #718093;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>📒 Мой Блокнот</h2>
        <button class="btn-add" id="addNotebookBtn">+ Добавить страницу</button>
        <ul class="notebook-list" id="notebookList"></ul>
    </div>

    <div class="main-content">
        <div class="no-notebook-overlay" id="noNotebookOverlay">
            <p>✒️ Откройте страницу, чтобы начать писать или рисовать</p>
        </div>

        <div class="toolbar">
            <div class="tool-group">
                <label>Чернила:</label>
                <input type="color" id="colorPicker" class="color-picker" value="#2f3640">
            </div>

            <div class="tool-group">
                <label>Перо:</label>
                <select id="brushType" class="select-brush">
                    <option value="calligraphy">✒️ Острое перо (с нажимом)</option>
                    <option value="flat">🖌️ Скошенная кисть (плоская)</option>
                </select>
            </div>

            <div class="tool-group">
                <label>Макс. размер:</label>
                <input type="range" id="brushSize" class="brush-size" min="4" max="40" value="12">
                <span id="sizeValue" style="font-size: 0.9rem; font-weight: bold; width: 20px;">12</span>
            </div>

            <div class="tool-group">
                <button id="toolDraw" class="btn-tool active">🎨 Писать</button>
                <button id="toolEraser" class="btn-tool">🧽 Ластик</button>
            </div>

            <button id="clearCanvas" class="btn-clear">🗑️ Очистить лист</button>
        </div>

        <div class="workspace">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="paintCanvas"></canvas>
            </div>
            <div class="notes-container">
                <h3 style="font-size: 1rem; color: #718093; font-weight: 600;">✍️ Заметки:</h3>
                <textarea id="notebookNotes" placeholder="Место для мыслей..."></textarea>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const canvasContainer = document.getElementById('canvasContainer');
        
        const addNotebookBtn = document.getElementById('addNotebookBtn');
        const notebookList = document.getElementById('notebookList');
        const noNotebookOverlay = document.getElementById('noNotebookOverlay');
        const notebookNotes = document.getElementById('notebookNotes');
        
        const colorPicker = document.getElementById('colorPicker');
        const brushType = document.getElementById('brushType');
        const brushSize = document.getElementById('brushSize');
        const sizeValue = document.getElementById('sizeValue');
        const toolDraw = document.getElementById('toolDraw');
        const toolEraser = document.getElementById('toolEraser');
        const clearCanvasBtn = document.getElementById('clearCanvas');

        let notebooks = [];
        let activeNotebookId = null;
        let isDrawing = false;
        let currentMode = 'draw'; 
        
        // Храним историю точек для расчета скорости и плавности
        let lastX = 0, lastY = 0;
        let lastThickness = 6;

        function resizeCanvas() {
            canvas.width = canvasContainer.clientWidth;
            canvas.height = canvasContainer.clientHeight;
            if (activeNotebookId) restoreCanvas();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function startDrawing(e) {
            if (!activeNotebookId) return;
            isDrawing = true;
            const pos = getMousePos(e);
            lastX = pos.x;
            lastY = pos.y;
            lastThickness = parseInt(brushSize.value) / 2;
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();

            const pos = getMousePos(e);
            const baseSize = parseInt(brushSize.value);
            
            ctx.save();
            
            if (currentMode === 'eraser') {
                // Ластик стирает плотным цветом бумаги
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#fdfbf7'; 
                ctx.lineWidth = baseSize * 2;
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            } else {
                const selectedBrush = brushType.value;
                ctx.fillStyle = colorPicker.value;
                ctx.strokeStyle = colorPicker.value;

                // Расстояние для расчета скорости
                const dist = Math.sqrt(Math.pow(pos.x - lastX, 2) + Math.pow(pos.y - lastY, 2));

                if (selectedBrush === 'calligraphy') {
                    // 1. ОСТРОЕ ПЕРО С НАЖИМОМ (динамическая толщина)
                    // Чем быстрее ведем руку, тем тоньше линия. Замедляемся — чернила ложатся гуще.
                    let targetThickness = baseSize - (dist * 0.8);
                    if (targetThickness < baseSize * 0.25) targetThickness = baseSize * 0.25;
                    if (targetThickness > baseSize) targetThickness = baseSize;

                    // Плавный переход толщины, чтобы не было рубленых стыков
                    let currentThickness = lastThickness + (targetThickness - lastThickness) * 0.3;

                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.lineWidth = currentThickness;
                    
                    ctx.beginPath();
                    ctx.moveTo(lastX, lastY);
                    ctx.lineTo(pos.x, pos.y);
                    ctx.stroke();

                    lastThickness = currentThickness;
                } 
                else if (selectedBrush === 'flat') {
                    // 2. СКОШЕННАЯ ПЛОСКАЯ КИСТЬ (каллиграфический срез)
                    // Плотные чернила, форма мазка — эллипс под углом 45 градусов.
                    const steps = Math.max(Math.floor(dist / 0.3), 1);
                    
                    for (let i = 0; i < steps; i++) {
                        const t = i / steps;
                        const x = lastX + (pos.x - lastX) * t;
                        const y = lastY + (pos.y - lastY) * t;
                        
                        ctx.beginPath();
                        // Рисуем плотную скошенную плашку чернил без прозрачности
                        ctx.ellipse(x, y, baseSize / 2, baseSize / 8, Math.PI / 4, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                }
            }
            
            ctx.restore();
            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                saveCurrentNotebookData();
            }
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        toolDraw.addEventListener('click', () => {
            currentMode = 'draw';
            toolDraw.classList.add('active');
            toolEraser.classList.remove('active');
        });

        toolEraser.addEventListener('click', () => {
            currentMode = 'eraser';
            toolEraser.classList.add('active');
            toolDraw.classList.remove('active');
        });

        brushSize.addEventListener('input', (e) => {
            sizeValue.textContent = e.target.value;
        });

        clearCanvasBtn.addEventListener('click', () => {
            if (confirm('Очистить эту страницу блокнота?')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                saveCurrentNotebookData();
            }
        });

        addNotebookBtn.addEventListener('click', () => {
            const name = prompt('Назовите новую страницу:', `Страница ${notebooks.length + 1}`);
            if (name === null || name.trim() === '') return;

            const newNotebook = { id: Date.now().toString(), name: name.trim(), notes: '', canvasData: null };
            notebooks.push(newNotebook);
            renderNotebookList();
            switchNotebook(newNotebook.id);
        });

        function renderNotebookList() {
            notebookList.innerHTML = '';
            notebooks.forEach(nb => {
                const li = document.createElement('li');
                li.className = `notebook-item ${nb.id === activeNotebookId ? 'active' : ''}`;
                li.textContent = nb.name;
                li.addEventListener('click', () => switchNotebook(nb.id));
                notebookList.appendChild(li);
            });
            noNotebookOverlay.style.display = notebooks.length === 0 ? 'flex' : 'none';
        }

        function switchNotebook(id) {
            if (activeNotebookId === id) return;
            if (activeNotebookId) saveCurrentNotebookData();
            activeNotebookId = id;
            const currentNb = notebooks.find(nb => nb.id === id);
            if (currentNb) {
                renderNotebookList();
                notebookNotes.value = currentNb.notes;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                restoreCanvas();
            }
        }

        function saveCurrentNotebookData() {
            if (!activeNotebookId) return;
            const currentNb = notebooks.find(nb => nb.id === activeNotebookId);
            if (currentNb) {
                currentNb.notes = notebookNotes.value;
                currentNb.canvasData = canvas.toDataURL();
            }
        }

        function restoreCanvas() {
            const currentNb = notebooks.find(nb => nb.id === activeNotebookId);
            if (currentNb && currentNb.canvasData) {
                const img = new Image();
                img.src = currentNb.canvasData;
                img.onload = () => ctx.drawImage(img, 0, 0);
            }
        }

        notebookNotes.addEventListener('input', saveCurrentNotebookData);
    </script>
</body>
</html>
