<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Творческий Блокнот</title>
    <style>
        :root {
            --bg-color: #f5f6fa;
            --sidebar-width: 280px;
            --primary-color: #74b9ff;
            --text-color: #2f3640;
            --border-color: #dcdde1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* Боковая панель */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #ffffff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
        }

        .sidebar h2 {
            font-size: 1.25rem;
            margin-bottom: 20px;
            color: #718093;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-add {
            background-color: #2f3640;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .btn-add:hover {
            background-color: #718093;
            transform: translateY(-1px);
        }

        .notebook-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .notebook-item {
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #f5f6fa;
            border: 1px solid transparent;
            font-weight: 500;
        }

        .notebook-item:hover {
            background-color: #dcdde1;
        }

        .notebook-item.active {
            background-color: #fbc531;
            color: #2f3640;
            font-weight: 600;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Главная область */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        /* Инструменты */
        .toolbar {
            height: 75px;
            background-color: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 20px;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-group label {
            font-size: 0.9rem;
            color: #718093;
            font-weight: 600;
            white-space: nowrap;
        }

        .color-picker {
            -webkit-appearance: none;
            appearance: none;
            width: 38px;
            height: 38px;
            background-color: transparent;
            border: none;
            cursor: pointer;
        }

        .color-picker::-webkit-color-swatch {
            border-radius: 50%;
            border: 2px solid #dcdde1;
        }

        .brush-size {
            cursor: pointer;
            accent-color: #2f3640;
            width: 100px;
        }

        .select-brush {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: #f5f6fa;
            font-size: 0.9rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
        }

        .btn-tool {
            background: #f5f6fa;
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-tool:hover {
            background: #dcdde1;
        }

        .btn-tool.active {
            background: #2f3640;
            color: white;
            border-color: #2f3640;
        }

        .btn-clear {
            margin-left: auto;
            background-color: #f5f6fa;
            color: #e84118;
            border: 1px solid #dcdde1;
        }

        .btn-clear:hover {
            background-color: #e84118;
            color: white;
            border-color: #e84118;
        }

        /* Рабочая область */
        .workspace {
            flex-grow: 1;
            display: flex;
            padding: 25px;
            gap: 25px;
            overflow: hidden;
        }

        .canvas-container {
            flex-grow: 1;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #e1b12c;
        }

        canvas {
            background-color: #fdfbf7;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 24px 24px;
            display: block;
            cursor: none; /* Убираем курсор мыши полностью */
        }

        .notes-container {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .notes-container textarea {
            flex-grow: 1;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            resize: none;
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            background: #fdfbf7;
            background-image: linear-gradient(#dcdde1 1px, transparent 1px);
            background-size: 100% 1.6rem;
            color: #2f3640;
        }

        .no-notebook-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
            color: #718093;
            font-size: 1.2rem;
