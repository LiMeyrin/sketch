<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Творческий Блокнот</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --sidebar-width: 280px;
            --primary-color: #ff7675;
            --text-color: #2d3436;
            --border-color: #dfe6e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* Боковая панель */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #ffffff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.03);
        }

        .sidebar h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #636e72;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-add {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(255, 118, 117, 0.2);
        }

        .btn-add:hover {
            background-color: #e84393;
            transform: translateY(-1px);
        }

        .notebook-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .notebook-item {
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #fbfbfb;
            border: 1px solid #f0f0f0;
            font-weight: 500;
        }

        .notebook-item:hover {
            background-color: #f5f6fa;
            border-color: #dcdde1;
        }

        .notebook-item.active {
            background-color: #ffeaa7;
            color: #2d3436;
            font-weight: 600;
            border-color: #fdcb6e;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Главная область */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        /* Инструменты */
        .toolbar {
            height: 75px;
            background-color: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tool-group label {
            font-size: 0.9rem;
            color: #636e72;
            font-weight: 600;
        }

        .color-picker {
            -webkit-appearance: none;
            appearance: none;
            width: 38px;
            height: 38px;
            background-color: transparent;
            border: none;
            cursor: pointer;
        }

        .color-picker::-webkit-color-swatch {
            border-radius: 50%;
            border: 2px solid #dfe6e9;
        }

        .brush-size {
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .btn-tool {
            background: #f5f6fa;
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-tool:hover {
            background: #dfe6e9;
        }

        .btn-tool.active {
            background: #2d3436;
            color: white;
            border-color: #2d3436;
        }

        .btn-clear {
            margin-left: auto;
            background-color: #fab1a0;
            color: #d63031;
            border: none;
            font-weight: 600;
        }

        .btn-clear:hover {
            background-color: #ff7675;
            color: white;
        }

        /* Рабочее пространство */
        .workspace {
            flex-grow: 1;
            display: flex;
            padding: 25px;
            gap: 25px;
            overflow: hidden;
        }

        /* Стилизация под страницу блокнота */
        .canvas-container {
            flex-grow: 1;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #e8e8e8;
        }

        canvas {
            /* Мягкий фон в клетку (как тетрадь) */
            background-color: #fafafa;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
            background-size: 25px 25px; /* Размер клеточки */
            cursor: crosshair;
            display: block;
        }

        .notes-container {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Заметки в линейку */
        .notes-container textarea {
            flex-grow: 1;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            resize: none;
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            background: #fffdf6; /* Цвет бумаги верже */
            background-image: linear-gradient(#e0decb 1px, transparent 1px);
            background-size: 100% 1.6rem;
            color: #2c3e50;
            transition: border-color 0.2s;
        }

        .notes-container textarea:focus {
            border-color: #fdcb6e;
        }

        .no-notebook-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
            color: #b2bec3;
            font-size: 1.3rem;
            gap: 12px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>📚 Мои Блокноты</h2>
        <button class="btn-add" id="addNotebookBtn">+ Новый блокнот</button>
        <ul class="notebook-list" id="notebookList"></ul>
    </div>

    <div class="main-content">
        <div class="no-notebook-overlay" id="noNotebookOverlay">
            <p>✨ Откройте или создайте блокнот, чтобы начать творчество</p>
        </div>

        <div class="toolbar">
            <div class="tool-group">
                <label>Палитра:</label>
                <input type="color" id="colorPicker" class="color-picker" value="#2d3436">
            </div>

            <div class="tool-group">
                <label>Размер:</label>
                <input type="range" id="brushSize" class="brush-size" min="2" max="40" value="8">
                <span id="sizeValue" style="font-size: 0.9rem; width: 20px; font-weight: bold;">8</span>
            </div>

            <div class="tool-group">
                <button id="toolBrush" class="btn-tool active">✨ Живая Кисть</button>
                <button id="toolEraser" class="btn-tool">🧽 Ластик</button>
            </div>

            <button id="clearCanvas" class="btn-tool btn-clear">🗑️ Очистить страницу</button>
        </div>

        <div class="workspace">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="paintCanvas"></canvas>
            </div>
            <div class="notes-container">
                <h3 style="font-size: 1rem; color: #636e72; font-weight: 600;">✍️ Текстовые заметки:</h3>
                <textarea id="notebookNotes" placeholder="Здесь можно писать..."></textarea>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const canvasContainer = document.getElementById('canvasContainer');
        
        const addNotebookBtn = document.getElementById('addNotebookBtn');
        const notebookList = document.getElementById('notebookList');
        const noNotebookOverlay = document.getElementById('noNotebookOverlay');
        const notebookNotes = document.getElementById('notebookNotes');
        
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const sizeValue = document.getElementById('sizeValue');
        const toolBrush = document.getElementById('toolBrush');
        const toolEraser = document.getElementById('toolEraser');
        const clearCanvasBtn = document.getElementById('clearCanvas');

        let notebooks = [];
        let activeNotebookId = null;
        
        let isDrawing = false;
        let currentMode = 'brush'; 
        
        // Массивы для хранения истории точек (для плавности алгоритма)
        let points = [];

        function resizeCanvas() {
            canvas.width = canvasContainer.clientWidth;
            canvas.height = canvasContainer.clientHeight;
            setupCanvasContext();
            
            // Перерисовка при изменении окна
            if (activeNotebookId) {
                restoreCanvas();
            }
        }

        function setupCanvasContext() {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- Улучшенный алгоритм рисования (Кривые Безье + динамическая толщина) ---
        function startDrawing(e) {
            if (!activeNotebookId) return;
            isDrawing = true;
            points = [];
            
            const pos = getMousePos(e);
            points.push({ x: pos.x, y: pos.y, time: Date.now() });
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();

            const pos = getMousePos(e);
            const now = Date.now();
            
            points.push({ x: pos.x, y: pos.y, time: now });

            if (points.length < 3) return;

            // Вычисляем скорость движения для красивого эффекта "живой кисти"
            const p1 = points[points.length - 2];
            const p2 = points[points.length - 1];
            const dist = Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
            const timeDiff = p2.time - p1.time || 1;
            const speed = dist / timeDiff;

            // Чем быстрее ведем, тем кисть чуть тоньше (эффект пера)
            const baseSize = parseInt(brushSize.value);
            let targetSize = baseSize;
            if (currentMode === 'brush') {
                targetSize = baseSize - (speed * 1.5);
                if (targetSize < baseSize * 0.4) targetSize = baseSize * 0.4; // ограничение тонкости
            }

            ctx.beginPath();
            
            // Сглаживание за счет кривых линии между точками
            const xc = (points[points.length - 2].x + points[points.length - 1].x) / 2;
            const yc = (points[points.length - 2].y + points[points.length - 1].y) / 2;
            
            ctx.moveTo(points[points.length - 3].x, points[points.length - 3].y);
            ctx.quadraticCurveTo(points[points.length - 2].x, points[points.length - 2].y, xc, yc);

            if (currentMode === 'eraser') {
                ctx.strokeStyle = '#fafafa'; // цвет холста под клеточкой
                ctx.lineWidth = baseSize * 1.5; // ластик чуть шире
            } else {
                ctx.strokeStyle = colorPicker.value;
                // Плавное изменение толщины кисти
                ctx.lineWidth = targetSize;
            }

            // Мягкие полупрозрачные края для эффекта настоящей краски
            if (currentMode === 'brush') {
                ctx.shadowBlur = 1;
                ctx.shadowColor = colorPicker.value;
            } else {
                ctx.shadowBlur = 0;
            }

            ctx.stroke();
            
            // Очищаем старые точки, чтобы не перегружать память
            if (points.length > 10) {
                points.shift();
            }
        }

        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                saveCurrentNotebookData();
            }
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        // --- Инструменты ---
        toolBrush.addEventListener('click', () => {
            currentMode = 'brush';
            toolBrush.classList.add('active');
            toolEraser.classList.remove('active');
        });

        toolEraser.addEventListener('click', () => {
            currentMode = 'eraser';
            toolEraser.classList.add('active');
            toolBrush.classList.remove('active');
        });

        brushSize.addEventListener('input', (e) => {
            sizeValue.textContent = e.target.value;
        });

        clearCanvasBtn.addEventListener('click', () => {
            if (confirm('Очистить этот лист тетради?')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                saveCurrentNotebookData();
            }
        });

        // --- Управление блокнотами ---
        addNotebookBtn.addEventListener('click', () => {
            const name = prompt('Как назовем новую страничку блокнота?', `Страница ${notebooks.length + 1}`);
            if (name === null || name.trim() === '') return;

            const newNotebook = {
                id: Date.now().toString(),
                name: name.trim(),
                notes: '',
                canvasData: null
            };

            notebooks.push(newNotebook);
            renderNotebookList();
            switchNotebook(newNotebook.id);
        });

        function renderNotebookList() {
            notebookList.innerHTML = '';
            notebooks.forEach(nb => {
                const li = document.createElement('li');
                li.className = `notebook-item ${nb.id === activeNotebookId ? 'active' : ''}`;
                li.textContent = nb.name;
                li.addEventListener('click', () => switchNotebook(nb.id));
                notebookList.appendChild(li);
            });

            if (notebooks.length === 0) {
                noNotebookOverlay.style.display = 'flex';
                activeNotebookId = null;
            } else {
                noNotebookOverlay.style.display = 'none';
            }
        }

        function switchNotebook(id) {
            if (activeNotebookId === id) return;
            if (activeNotebookId) saveCurrentNotebookData();

            activeNotebookId = id;
            const currentNb = notebooks.find(nb => nb.id === id);
            
            if (currentNb) {
                renderNotebookList();
                notebookNotes.value = currentNb.notes;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                restoreCanvas();
            }
        }

        function saveCurrentNotebookData() {
            if (!activeNotebookId) return;
            const currentNb = notebooks.find(nb => nb.id === activeNotebookId);
            if (currentNb) {
                currentNb.notes = notebookNotes.value;
                currentNb.canvasData = canvas.toDataURL();
            }
        }

        function restoreCanvas() {
            const currentNb = notebooks.find(nb => nb.id === activeNotebookId);
            if (currentNb && currentNb.canvasData) {
                const img = new Image();
                img.src = currentNb.canvasData;
                img.onload = () => {
                    setupCanvasContext();
                    ctx.drawImage(img, 0, 0);
                };
            }
        }

        notebookNotes.addEventListener('input', saveCurrentNotebookData);
    </script>
</body>
</html>
